naftiko: "1.0.0-alpha1"
info:
  label: AWS IAM Identity Center Identity Store API
  description: Manages users, groups, and memberships in the IAM Identity Center identity store.
  tags:
    - AWS
    - IAM
    - Identity Management
    - Users
    - Groups
  created: "2026-04-19"
  modified: "2026-04-19"
binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
    - type: http
      namespace: identitystore
      baseUri: https://identitystore.amazonaws.com
      description: AWS Identity Store REST API
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: users
          path: /identitystores/{IdentityStoreId}/users
          description: Identity store users
          operations:
            - name: list-users
              method: GET
              description: List users in the identity store
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user
              method: POST
              description: Create a new user
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: groups
          path: /identitystores/{IdentityStoreId}/groups
          description: Identity store groups
          operations:
            - name: list-groups
              method: GET
              description: List groups in the identity store
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-group
              method: POST
              description: Create a new group
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
  exposes:
    - type: rest
      port: 8101
      namespace: identitystore-rest
      resources:
        - path: /v1/users
          name: users
          description: Manage identity store users
          operations:
            - method: GET
              name: list-users
              description: List all users
              call: "identitystore.list-users"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      port: 9101
      namespace: identitystore-mcp
      transport: http
      tools:
        - name: list-users
          description: List users in the identity store
          hints:
            readOnly: true
          call: "identitystore.list-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-user
          description: Create a new user in the identity store
          hints:
            readOnly: false
          call: "identitystore.create-user"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-groups
          description: List groups in the identity store
          hints:
            readOnly: true
          call: "identitystore.list-groups"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-group
          description: Create a new group in the identity store
          hints:
            readOnly: false
          call: "identitystore.create-group"
          outputParameters:
            - type: object
              mapping: "$."
