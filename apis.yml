aid: amazon-iam-identity-center
name: Amazon IAM Identity Center
description: >-
  AWS IAM Identity Center (successor to AWS Single Sign-On) is where you create,
  or connect, your workforce identities in AWS once and manage access centrally
  across your AWS organization. You can create user identities directly in IAM
  Identity Center, or bring them from Microsoft Active Directory, and then use
  IAM Identity Center to manage user access to AWS accounts and business
  applications with single sign-on.
